version: "3.8"

services:
  app:
    build: .
    container_name: airbnb-api
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    environment:
      MONGO_URI: mongodb://mongodb:27017/airbnb
      NODE_ENV: production

  mongodb:
    image: mongo:7
    container_name: airbnb-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
